<body>
  <h1 id="animated-text" class="devonshire-regular">AX PRINCIPAL</h1>

  <!-- TEMPORIZADOR ACTIVO -->
  <div class="timer-wrapper">
    <div class="timer-container">
      <div class="timer-title">MUNDIAL 2026</div>
      <div class="timer-display">
        <div class="time-unit">
          <div class="time-value" id="days-container"><div class="time-value-inner">00</div></div>
          <div class="time-label">Días</div>
        </div>
        <div class="timer-separator">:</div>
        <div class="time-unit">
          <div class="time-value" id="hours-container"><div class="time-value-inner">00</div></div>
          <div class="time-label">Horas</div>
        </div>
        <div class="timer-separator">:</div>
        <div class="time-unit">
          <div class="time-value" id="minutes-container"><div class="time-value-inner">00</div></div>
          <div class="time-label">Minutos</div>
        </div>
        <div class="timer-separator">:</div>
        <div class="time-unit">
          <div class="time-value" id="seconds-container"><div class="time-value-inner">00</div></div>
          <div class="time-label">Segundos</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== WIDGET CONTADOR DE ORO ===== -->
  <div id="gold-counter-widget" class="gold-widget-container">
    <div class="gold-widget">
      <div class="gold-widget-title">Precio del Oro</div>
      <div class="gold-widget-content">
        <div class="gold-widget-row">
          <span class="gold-widget-label">Por Onza:</span>
          <span class="gold-widget-value" id="gold-price-oz">$--</span>
        </div>
        <div class="gold-widget-row">
          <span class="gold-widget-label">Por Gramo:</span>
          <span class="gold-widget-value" id="gold-price-gram">$--</span>
        </div>
        <div class="gold-widget-row">
          <span class="gold-widget-label">Cambio USD/COP:</span>
          <span class="gold-widget-value" id="gold-exchange-rate">--</span>
        </div>
        <div class="gold-widget-row gold-widget-update">
          <span class="gold-widget-label">Actualizado:</span>
          <span class="gold-widget-value" id="gold-update-time">--:--:--</span>
        </div>
      </div>
    </div>
  </div>

  <div class="button-container">
    <a href="raspa/" class="button">¿ R A S P A ?</a>
    <a href="viwnet/" class="button">ANTIGUO VIWNET</a>
    <a href="Windows/" class="button">Activación de Windows</a>
    <a href="web-apks/" class="button">ApHacks (INAPKS)</a>
    <a href="IA/" class="button">IA - Experimental (BETA)</a>
    <a href="FF/" class="button">Countdown FF</a> 
    <a href="https://github.com/ax-col/ax" class="button">Repositorio AX</a>
  <!--  <a href="CPWEB/" class="button">CP WEB (Colaboración) Para curiosos</a> -->
    </div>

<button class="mute-toggle" onclick="toggleMute()">SILENCIAR</button>

<video class="video-fondo" id="videoFondo" autoplay loop playsinline preload="auto">
  </video>

<!-- Script JS corregido con versión (sin duplicar) -->
<script src="script.js?v=M3V3"></script>

</body>
</html>

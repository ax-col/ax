<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AX PRINCIPAL</title>
<meta name="description" content="AX alojado en GitHub Pages.">

<script>
    (function() {
        const isGithub = window.location.hostname.includes("github.io");
        // Forzamos la ruta correcta con o sin slash final
        const scriptPath = isGithub ? "/ax/analytics-loader.js" : "./analytics-loader.js";
        
        const script = document.createElement('script');
        script.type = 'module';
        script.src = scriptPath;
        document.head.appendChild(script);
    })();
</script>

<link rel="stylesheet" href="styles.css">

<meta property="og:title" content="AX – PROYECT">
<meta property="og:description" content="AX - COL se encuentra alojada en GitHub Pages. (Dominio github.com) </>">
<meta property="og:image" content="png-principal/icon-512x512.png">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Devonshire&display=swap" rel="stylesheet">

<style>
  /* Preloader sutil para que el APK no abra en blanco */
  #preloader {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; z-index: 9999; display: flex;
    justify-content: center; align-items: center;
    transition: opacity 0.5s ease;
  }
</style>
</head>


<body>
  <div id="preloader">
    <img src="png-principal/icon-192x192.png" width="80" alt="AX">
  </div>

  <h1 id="animated-text" class="devonshire-regular">AX PRINCIPAL</h1>

  <div class="timer-wrapper">
    <div class="timer-container">
      <div class="timer-title">CONTADOR 2027</div>
      <div class="timer-display">
        <div class="time-unit">
          <div class="time-value" id="days-container"><div class="time-value-inner">00</div></div>
          <div class="time-label">Días</div>
        </div>
        <div class="timer-separator">:</div>
        <div class="time-unit">
          <div class="time-value" id="hours-container"><div class="time-value-inner">00</div></div>
          <div class="time-label">Horas</div>
        </div>
        <div class="timer-separator">:</div>
        <div class="time-unit">
          <div class="time-value" id="minutes-container"><div class="time-value-inner">00</div></div>
          <div class="time-label">Minutos</div>
        </div>
        <div class="timer-separator">:</div>
        <div class="time-unit">
          <div class="time-value" id="seconds-container"><div class="time-value-inner">00</div></div>
          <div class="time-label">Segundos</div>
        </div>
      </div>
    </div>
  </div>

  <!-- SECCIÓN DE ZONAS HORARIAS UTC EN LUGAR DE PRECIO DEL ORO Y BITCOIN -->
  <div class="utc-widget-container">
    <!-- Botón de acción para ir a la página completa time.html justo encima de las casillas UTC -->
    <a href="https://ax-col.github.io/ax/TIME/time.html" class="btn-utc-action">
      AX / VER MAPA Y ZONAS HORARIAS COMPLETAS
    </a>

    <!-- Casillas colapsables desplegables por UTC -->
    <div class="utc-accordion" id="utcAccordion">
      <!-- Generado dinámicamente desde script.js -->
    </div>
  </div>

  <div class="button-container">
    <a href="curts/index.html" class="button">Acortar Enlaces</a>
    <a href="main_ax.html" class="button">Main AX</a>
    <a href="Windows/index.html" class="button">Activación de Windows</a>
    <a href="FF/index.html" class="button">Countdown FF</a>
    <a href="TIME/time.html" class="button">Zonas Horarias</a>
    <a href="https://github.com/ax-col/ax" class="button">Repositorio AX</a>
  </div>
  
  <div class="ax-cyber-card-compact">
    <div class="ax-cyber-border"></div>
    <div class="ax-cyber-content">
        <h3>SISTEMA AX - CORE</h3>
        <p>Descargar paquete móvil [base.apk]</p>
        
        <a href="https://github.com/ax-col/app/raw/refs/heads/main/base.apk" download="AX-Comunidad.apk" class="btn-cyber-download">
            <span class="btn-glow"></span>
            <span class="btn-text">📥 DESCARGAR APK</span>
        </a>
    </div>
  </div>

  <button class="mute-toggle" onclick="toggleMute()">ACTIVAR SONIDO</button>

  <video class="video-fondo" id="videoFondo" autoplay muted loop playsinline preload="auto">
  </video>

  <script src="script.js"></script>
  
  <script>
    // Registro de SW optimizado para el APK
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log("AX: Sistema Offline Listo"))
          .catch(err => console.log("AX: Error SW", err));
      });
    }

    // Control del preloader
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('preloader');
        if(loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.style.display = 'none', 500);
        }
      }, 1000);
    });
  </script>

</body>
</html>

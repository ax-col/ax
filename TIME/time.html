    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Time Map</title>

    <script>
    (function() {
        const isGithub = window.location.hostname.includes("github.io");
        const scriptPath = isGithub ? "/ax/analytics-loader.js" : "./analytics-loader.js";
        
        const script = document.createElement('script');
        script.type = 'module';
        script.src = scriptPath;
        document.head.appendChild(script);
    })();
    </script>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet Terminator -->
    <script src="https://cdn.jsdelivr.net/npm/@joergdietrich/leaflet.terminator@1.0.0/L.Terminator.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0b0f17;
        }

        #map {
            height: 420px;
            width: 100%;
            background: #0d131d;
            border-radius: 1.25rem;
            will-change: transform;
        }

        .leaflet-container {
            background-color: #0b0f17 !important;
        }

        .custom-popup .leaflet-popup-content-wrapper {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #f8fafc;
            border-radius: 1rem;
            padding: 4px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .custom-popup .leaflet-popup-tip {
            background: rgba(15, 23, 42, 0.95);
        }

        .custom-pin {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .pin-marker {
            width: 12px;
            height: 12px;
            background-color: #6366f1;
            border: 2px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 8px #6366f1;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0f17; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="text-slate-100 min-h-screen p-3 sm:p-6 lg:p-8">

    <!-- Navbar / Header -->
    <header class="max-w-7xl mx-auto mb-6 flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-900/60 p-4 sm:p-5 rounded-2xl border border-slate-800/80 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-indigo-600/20 border border-indigo-500/30 flex items-center justify-center text-indigo-400 font-bold text-xl">
                <i class="fa-solid fa-earth-americas"></i>
            </div>
            <div>
                <h1 class="text-xl sm:text-2xl font-extrabold tracking-tight text-white">ChronoEarth</h1>
                <p class="text-xs text-slate-400">Mapa de ciclo Solar y Zonas Horarias Mundiales</p>
            </div>
        </div>

        <!-- Buscador Inteligente -->
        <div class="relative w-full md:w-96">
            <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
            <input type="text" id="searchInput" placeholder="Buscar entre 195 países o capitales..." 
                class="w-full pl-10 pr-4 py-2.5 bg-slate-950/70 border border-slate-800 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-100 placeholder-slate-500 transition-all">
        </div>
    </header>

    <!-- Contenedor Principal -->
    <main class="max-w-7xl mx-auto space-y-6">

        <!-- PANEL SUPERIOR: MAPA DE DÍA Y NOCHE -->
        <section class="bg-slate-900/40 border border-slate-800/80 p-3 sm:p-4 rounded-3xl backdrop-blur-xl relative overflow-hidden shadow-2xl">
            <div class="flex items-center justify-between mb-3 px-2">
                <div class="flex items-center gap-2">
                    <span class="inline-block w-2.5 h-2.5 rounded-full bg-emerald-500 animate-ping"></span>
                    <h2 class="text-xs font-bold uppercase tracking-wider text-slate-400">Mapa Global en Vivo (Ciclo Sol / Sombra)</h2>
                </div>
                <div class="text-[11px] text-slate-400 flex items-center gap-4">
                    <span class="flex items-center gap-1.5"><i class="fa-solid fa-sun text-amber-400"></i> Día</span>
                    <span class="flex items-center gap-1.5"><i class="fa-solid fa-moon text-indigo-400"></i> Noche</span>
                </div>
            </div>

            <!-- Mapa Container -->
            <div id="map" class="relative z-10 shadow-inner"></div>
        </section>

        <!-- PANEL INFERIOR -->
        <section class="space-y-4" id="zonesContainer">
            <!-- Renderizado dinámico -->
        </section>

    </main>

            { name: "Zimbabue", capital: "Harare", code: "zw", timeZone: "Africa/Harare", lat: -17.8252, lng: 31.0335 }

        // 2. MAPA E INICIALIZACIÓN OPTIMIZADA
        let map, terminator;
        let mapMarkers = [];

        function initMap() {
            map = L.map('map', {
                center: [20, 0],
                zoom: 2,
                minZoom: 2,
                maxZoom: 6,
                zoomControl: false,
                attributionControl: false,
                preferCanvas: true // Aceleración de renderizado
            });

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);

            terminator = L.terminator({
                fillColor: '#000000',
                fillOpacity: 0.55,
                color: '#6366f1',
                weight: 1,
                opacity: 0.4
            }).addTo(map);

            // Actualización de sombra cada 2 minutos en vez de saturar hilos
            setInterval(() => requestAnimationFrame(() => terminator.setTime()), 120000);

            renderMapPins();
        }

        // Cache de formateadores de fecha para no instanciar objetos en bucles
        const formattersCache = new Map();
        function getFormatters(timeZone) {
            if (!formattersCache.has(timeZone)) {
                formattersCache.set(timeZone, {
                    time: new Intl.DateTimeFormat('es-ES', { timeZone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }),
                    date: new Intl.DateTimeFormat('es-ES', { timeZone, weekday: 'short', day: 'numeric', month: 'short' }),
                    hour24: new Intl.DateTimeFormat('en-US', { timeZone, hour: 'numeric', hour12: false })
                });
            }
            return formattersCache.get(timeZone);
        }

        function getCountryTimeData(country) {
            const now = new Date();
            const { time, date, hour24 } = getFormatters(country.timeZone);
            const hourNum = parseInt(hour24.format(now), 10);

            return {
                time: time.format(now),
                date: date.format(now).toUpperCase(),
                isDay: hourNum >= 6 && hourNum < 18
            };
        }

        function renderMapPins() {
            mapMarkers.forEach(m => map.removeLayer(m.marker));
            mapMarkers = [];

            const customIcon = L.divIcon({
                className: 'custom-pin',
                html: `<div class="pin-marker"></div>`,
                iconSize: [12, 12],
                iconAnchor: [6, 6]
            });

            // Agregamos marcadores directamente
            countries.forEach(c => {
                const marker = L.marker([c.lat, c.lng], { icon: customIcon }).addTo(map);

                marker.on('click', () => {
                    const data = getCountryTimeData(c);
                    const popupContent = `
                        <div class="flex items-center gap-3 p-2 min-w-[210px]">
                            <img src="https://flagcdn.com/w80/${c.code}.png" class="w-8 h-5 object-cover rounded shadow border border-slate-700">
                            <div>
                                <div class="flex items-center gap-1.5">
                                    <h4 class="font-bold text-sm text-white">${c.name}</h4>
                                    <i class="fa-solid ${data.isDay ? 'fa-sun text-amber-400' : 'fa-moon text-indigo-400'} text-xs"></i>
                                </div>
                                <div class="text-base font-bold text-indigo-400 font-mono tracking-wide mt-0.5">${data.time}</div>
                                <div class="text-[10px] text-slate-400 font-medium">${c.capital} • ${data.date}</div>
                            </div>
                        </div>
                    `;
                    marker.bindPopup(popupContent, { className: 'custom-popup', offset: [0, -5] }).openPopup();
                });

                mapMarkers.push({ code: c.code, marker: marker, country: c });
            });
        }

        // 3. LÓGICA DE GRUPOS Y OPTIMIZACIÓN DE BUSQUEDA
        function getUTCOffsetMinutes(timeZone) {
            const now = new Date();
            const tzString = now.toLocaleString('en-US', { timeZone, timeZoneName: 'shortOffset' });
            const match = tzString.match(/GMT([+-]\d+)(?::(\d+))?/);
            if (!match) return 0;
            const hours = parseInt(match[1], 10);
            const minutes = match[2] ? parseInt(match[2], 10) : 0;
            return hours * 60 + (hours < 0 ? -minutes : minutes);
        }

        function formatOffsetLabel(offsetMinutes) {
            const hours = Math.floor(Math.abs(offsetMinutes) / 60);
            const mins = Math.abs(offsetMinutes) % 60;
            const sign = offsetMinutes >= 0 ? '+' : '-';
            return `UTC${sign}${hours}${mins > 0 ? `:${mins}` : ''}`;
        }

        let groupedZones = [];
        const container = document.getElementById('zonesContainer');
        const searchInput = document.getElementById('searchInput');

        function buildGroups(filterText = "") {
            const groupsMap = new Map();
            const cleanFilter = filterText.toLowerCase().trim();

            countries.forEach(c => {
                if (cleanFilter && !c.name.toLowerCase().includes(cleanFilter) && !c.capital.toLowerCase().includes(cleanFilter)) {
                    return;
                }

                const offset = getUTCOffsetMinutes(c.timeZone);
                if (!groupsMap.has(offset)) {
                    groupsMap.set(offset, {
                        offset: offset,
                        timeZone: c.timeZone,
                        countries: []
                    });
                }
                groupsMap.get(offset).countries.push(c);
            });

            groupedZones = Array.from(groupsMap.values()).sort((a, b) => a.offset - b.offset);
            renderHTML();
        }

        function renderHTML() {
            container.innerHTML = "";

            if (groupedZones.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-slate-500 font-medium">No se encontraron países coincidentes</div>`;
                return;
            }

            const fragment = document.createDocumentFragment();

            groupedZones.forEach((group, index) => {
                const groupEl = document.createElement('section');
                groupEl.className = "bg-slate-900/40 border border-slate-800/80 rounded-2xl p-4 sm:p-5 backdrop-blur-xl transition-all";
                
                const countriesHTML = group.countries.map(c => `
                    <div onclick="focusCountryOnMap('${c.code}')" class="flex items-center gap-3 bg-slate-950/60 hover:bg-slate-800/60 p-2.5 rounded-xl border border-slate-800/60 cursor-pointer transition-all duration-200 group">
                        <img src="https://flagcdn.com/w80/${c.code}.png" 
                             alt="${c.name}" 
                             loading="lazy"
                             class="w-8 h-5 object-cover rounded shadow-sm border border-slate-700/50 flex-shrink-0">
                        <div class="min-w-0 flex-1">
                            <h3 class="text-xs sm:text-sm font-semibold text-slate-200 truncate group-hover:text-indigo-300">${c.name}</h3>
                            <p class="text-[10px] sm:text-[11px] text-slate-400 truncate">${c.capital}</p>
                        </div>
                        <i class="fa-solid fa-location-crosshairs text-slate-600 group-hover:text-indigo-400 text-xs pr-1"></i>
                    </div>
                `).join('');

                groupEl.innerHTML = `
                    <div class="flex justify-between items-center mb-3.5 border-b border-slate-800/80 pb-3">
                        <div class="flex items-center gap-2.5">
                            <span class="bg-indigo-500/10 text-indigo-400 text-xs font-bold px-3 py-1 rounded-lg border border-indigo-500/20">
                                ${formatOffsetLabel(group.offset)}
                            </span>
                            <span class="text-xs text-slate-400 font-medium">${group.countries.length} ${group.countries.length === 1 ? 'país' : 'países'}</span>
                        </div>
                        <div class="text-right">
                            <span id="time-group-${index}" class="text-lg sm:text-xl font-bold text-indigo-400 font-mono tracking-wider">--:--:--</span>
                            <span id="date-group-${index}" class="text-[11px] sm:text-xs text-slate-400 ml-2 font-medium">---</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2.5">
                        ${countriesHTML}
                    </div>
                `;

                fragment.appendChild(groupEl);
            });

            container.appendChild(fragment);
            updateClocksFast();
        }

        function focusCountryOnMap(code) {
            const item = mapMarkers.find(m => m.code === code);
            if (item && map) {
                map.flyTo([item.country.lat, item.country.lng], 4, { duration: 1 });
                item.marker.fire('click');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // Ticking loop optimizado mediante requestAnimationFrame
        let lastTick = 0;
        function updateClocksFast(timestamp) {
            if (timestamp - lastTick < 1000 && lastTick !== 0) {
                requestAnimationFrame(updateClocksFast);
                return;
            }
            lastTick = timestamp;

            const now = new Date();
            
            groupedZones.forEach((group, index) => {
                const timeEl = document.getElementById(`time-group-${index}`);
                const dateEl = document.getElementById(`date-group-${index}`);

                if (timeEl && dateEl) {
                    const { time, date } = getFormatters(group.timeZone);
                    timeEl.textContent = time.format(now);
                    dateEl.textContent = date.format(now).toUpperCase();
                }
            });

            requestAnimationFrame(updateClocksFast);
        }

        // Debounce para la búsqueda
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => buildGroups(e.target.value), 200);
        });

        // Inicialización General
        window.addEventListener('DOMContentLoaded', () => {
            initMap();
            buildGroups();
            requestAnimationFrame(updateClocksFast);
        });
    </script>

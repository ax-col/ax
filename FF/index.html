<title>Temporizador de Fechas</title>
<script>
    (function() {
        const isGithub = window.location.hostname.includes("github.io");
        // CORRECCIÓN: En GitHub va a la raíz absoluta, en local sube un nivel (../) para salir de la subcarpeta
        const scriptPath = isGithub ? "/ax/analytics-loader.js" : "../analytics-loader.js";
        
        const script = document.createElement('script');
        script.type = 'module';
        script.src = scriptPath;
        document.head.appendChild(script);
    })();
</script>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AX Link Shortener - Panel Curts</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center; max-width: 450px; width: 90%; }
        h1 { color: #00adb5; margin-bottom: 20px; font-size: 28px; }
        p { color: #aaaaaa; font-size: 14px; }
        input[type="url"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #393e46; border-radius: 6px; background-color: #222831; color: #fff; box-sizing: border-box; font-size: 16px; }
        input[type="url"]:focus { outline: none; border-color: #00adb5; }
        button { background-color: #00adb5; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #007c82; }
        .resultado { margin-top: 20px; padding: 15px; background-color: #222831; border-radius: 6px; display: none; word-break: break-all; border: 1px dashed #00adb5; }
        .resultado a { color: #00adb5; font-weight: bold; text-decoration: none; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h1>AX Link Shortener</h1>
    <p>Introduce cualquier enlace largo para guardarlo en la nube:</p>
    <input type="url" id="urlLarga" placeholder="https://ejemplo.com/link-largo" required>
    <button onclick="crearEnlace()">Acortar Enlace</button>

    <div class="resultado" id="zonaResultado">
        <p>¡Link global generado con éxito!</p>
        <p><a id="linkAcortado" href="#" target="_blank"></a></p>
    </div>
</div>

<script>
    // CAMBIO CLAVE: Ahora los enlaces generados apuntarán directamente a tu archivo receptor
    const BASE_URL = "https://ax-col.github.io/ax/rf.html";
    const SUPABASE_URL = "https://bkgklfnwqunogtqclrho.supabase.co";
    const SUPABASE_KEY = "sb_publishable_O0MJd3GpF_oL7TVdLdUYEQ_mwCy81A-"; 
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function crearEnlace() {
        const urlLarga = document.getElementById('urlLarga').value.trim();
        
        if (!urlLarga || !urlLarga.startsWith('http')) {
            alert("Por favor, introduce un enlace válido (que empiece con http:// o https://)");
            return;
        }

        const numeroAleatorio = Math.floor(100000 + Math.random() * 900000);
        const nuevoCodigo = "rf" + numeroAleatorio;

        // Guarda cualquier link dinámico que pongas en la caja de texto
        const { error } = await supabaseClient
            .from('enlaces')
            .insert([{ codigo: nuevoCodigo, url_larga: urlLarga }]);

        if (error) {
            alert("Error al conectar con tu base de datos: " + error.message);
            return;
        }

        // Armará el link como: https://ax-col.github.io/ax/curts-ref.html?id=rfXXXXXX
        const linkFinal = BASE_URL + "?id=" + nuevoCodigo;
        const tagA = document.getElementById('linkAcortado');
        tagA.href = linkFinal;
        tagA.innerText = linkFinal;
        
        document.getElementById('zonaResultado').style.display = 'block';
    }
</script>

</body>
</html>

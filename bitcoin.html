<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin - Gráfica en Tiempo Real</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f1a;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            margin-bottom: 10px;
            color: #f7931a;
        }
        .price {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .change {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .container {
            width: 95%;
            max-width: 1100px;
            background: #1a1a2e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        canvas {
            max-height: 500px;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        .positive { color: #00ff9d; }
        .negative { color: #ff4d4d; }
    </style>
</head>
<body>
    <h1>Bitcoin (BTC/USDT) - Tiempo Real</h1>
    <div class="price" id="currentPrice">$ --,--</div>
    <div class="change" id="priceChange">Cargando...</div>

    <div class="container">
        <canvas id="btcChart"></canvas>
    </div>

    <div class="footer">
        Datos en tiempo real vía Binance WebSocket • Gráfica con Chart.js
    </div>

    <script>
        // Configuración del gráfico
        const ctx = document.getElementById('btcChart').getContext('2d');
        let chart;

        // Datos del gráfico
        let labels = [];
        let prices = [];
        let lastPrice = 0;
        let startPrice = 0;

        function createChart() {
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Precio BTC/USDT (USD)',
                        data: prices,
                        borderColor: '#f7931a',
                        backgroundColor: 'rgba(247, 147, 26, 0.1)',
                        borderWidth: 2,
                        tension: 0.1,
                        pointRadius: 0,
                        pointHoverRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#aaa', maxTicksLimit: 12 }
                        },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#aaa' }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: '#1a1a2e',
                            titleColor: '#fff',
                            bodyColor: '#f7931a'
                        }
                    },
                    interaction: {
                        intersect: false,
                        mode: 'nearest'
                    }
                }
            });
        }

        // Actualizar precio actual y cambio
        function updatePriceDisplay(price) {
            const priceEl = document.getElementById('currentPrice');
            const changeEl = document.getElementById('priceChange');

            priceEl.textContent = '$ ' + price.toLocaleString('en-US', { minimumFractionDigits: 2 });

            if (startPrice === 0) startPrice = price;

            const change = ((price - startPrice) / startPrice) * 100;
            const changeText = change >= 0 
                ? `<span class="positive">▲ +${change.toFixed(2)}%</span>` 
                : `<span class="negative">▼ ${change.toFixed(2)}%</span>`;

            changeEl.innerHTML = `Cambio desde inicio: ${changeText}`;
        }

        // Añadir nuevo punto al gráfico
        function addData(price) {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + 
                           now.getMinutes().toString().padStart(2, '0') + ':' + 
                           now.getSeconds().toString().padStart(2, '0');

            labels.push(timeStr);
            prices.push(price);

            // Mantener solo los últimos 200 puntos (para que no se vuelva lento)
            if (labels.length > 200) {
                labels.shift();
                prices.shift();
            }

            chart.update('none'); // Actualización suave sin animación completa
            updatePriceDisplay(price);
        }

        // Cargar datos históricos iniciales con CoinGecko (últimos 30 días, pero tomamos puntos recientes)
        async function loadHistoricalData() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=1&interval=minute');
                const data = await res.json();

                const pricesData = data.prices; // [[timestamp, price], ...]

                labels = [];
                prices = [];

                // Tomar los últimos \~100-150 puntos para no saturar
                const startIndex = Math.max(0, pricesData.length - 120);

                for (let i = startIndex; i < pricesData.length; i++) {
                    const date = new Date(pricesData[i][0]);
                    labels.push(date.getHours() + ':' + date.getMinutes().toString().padStart(2, '0'));
                    prices.push(pricesData[i][1]);
                }

                if (prices.length > 0) {
                    lastPrice = prices[prices.length - 1];
                    startPrice = prices[0];
                    updatePriceDisplay(lastPrice);
                }

                if (!chart) createChart();
                else chart.update();

            } catch (e) {
                console.warn("No se pudieron cargar datos históricos. Se usará solo WebSocket.", e);
                if (!chart) createChart();
            }
        }

        // Conexión WebSocket de Binance (precio en tiempo real)
        function connectWebSocket() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const price = parseFloat(data.p); // precio del trade

                if (!isNaN(price)) {
                    lastPrice = price;
                    addData(price);
                }
            };

            ws.onclose = () => {
                console.log("WebSocket cerrado. Reconectando en 3s...");
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (err) => {
                console.error("Error WebSocket:", err);
            };
        }

        // Iniciar todo
        window.onload = () => {
            loadHistoricalData();
            connectWebSocket();

            // Actualización de respaldo cada 10 segundos por si falla el WS
            setInterval(() => {
                if (lastPrice > 0) {
                    addData(lastPrice); // mantiene la gráfica "viva"
                }
            }, 10000);
        };
    </script>
</body>
</html>
